name: Generate a build and push to another branch

on:
  push:
    branches: [main, master]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build and Push
    steps:
      - name: git-checkout
        uses: actions/checkout@v4

      - name: Pnpm Setup
        uses: pnpm/action-setup@v2
        with:
          version: 8.7.5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: "pnpm"

      - name: Install Dependencies
        run: pnpm install

      - name: Build
        run: pnpm run build

      - name: Push dist to build branch
        env:
          REPO_URL: https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
        run: |
          set -e

          if git ls-remote --heads "$REPO_URL" build | grep -q refs/heads/build; then
            git clone --branch build --single-branch "$REPO_URL" deploy-repo
          else
            mkdir -p deploy-repo
            git -C deploy-repo init -b build
            git -C deploy-repo remote add origin "$REPO_URL"
          fi

          cd deploy-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          find . -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +

          cp -r ../dist/* .
          cp ../dist/.nojekyll . 2>/dev/null || true

          git add -A

          if git diff --staged --quiet; then
            echo "Build output unchanged; empty commit to trigger deployment"
            git commit --allow-empty -m "Build: ${{ github.sha }} (unchanged output)"
          else
            git commit -m "Build: ${{ github.sha }}"
          fi

          git push origin build
